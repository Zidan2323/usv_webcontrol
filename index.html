<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCS AHRS - USV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        
        .container {
            width: 90vw; height: 90vh; max-width: 1200px; max-height: 800px;
            background: #fff; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            border: 1px solid #e1e4e8; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Top Header */
        .header {
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;
        }
        h2 { color: #ff6b00; margin: 0; font-size: 18px; font-weight: 800; text-transform: uppercase; }
        .status { padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 10px; background-color: #d9383a; color: #fff; }
        .connected { background-color: #2ed573; }

        /* --- SPLIT-SCREEN LAYOUT --- */
        .content-body { display: flex; flex: 1; min-height: 0; /* Important for flex child */ }

        /* KIRI: VIDEO PANEL */
        .video-panel { flex: 1.2; border-right: 1px solid #eee; padding: 15px; display: flex; flex-direction: column; }
        .video-wrapper {
            width: 100%; flex: 1; background-color: #000; border-radius: 12px; border: 3px solid #ff6b00;
            overflow: hidden; position: relative;
        }
        .video-wrapper iframe { width: 100%; height: 100%; border: none; }
        .video-overlay {
            position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6);
            padding: 4px 8px; border-radius: 5px; font-size: 10px; font-family: monospace; color: #ff9f43; z-index: 10;
        }

        /* RECONNECT VIDEO BUTTON - Di bawah video wrapper */
        .video-btns { margin-top: 10px; }
        .reconnect-btn {
            width: 100%; background: #fff5ed; color: #ff6b00; border: 1px solid #ffbb80;
            padding: 8px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .reconnect-btn:active { background: #ff6b00; color: white; }

        /* KANAN: TELEMETRI & KONTROL PANEL */
        .data-control-panel { flex: 1; padding: 15px; display: flex; flex-direction: column; }

        /* AHRS VISUAL */
        .ahrs-box {
            width: 100%; height: 140px; background: #333; border-radius: 12px;
            margin-bottom: 15px; position: relative; overflow: hidden; border: 3px solid #666;
        }
        .ahrs-sky {
            position: absolute; width: 200%; height: 400%; top: -150%; left: -50%;
            background: linear-gradient(to bottom, #4cc9f0 50%, #8b4513 50%);
            transition: transform 0.05s linear;
        }
        .ahrs-overlay {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; align-items: center; justify-content: center; pointer-events: none;
        }
        .ship-indi {
            width: 60%; height: 2px; background: #ff6b00; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .ahrs-text {
            position: absolute; bottom: 5px; width: 100%; display: flex;
            justify-content: space-around; color: white; font-family: monospace; font-size: 10px;
        }

        /* DATA GRID */
        .data-stats-grid {
            display: flex; justify-content: space-around; background: #fdf1e7;
            padding: 10px; border-radius: 10px; margin-bottom: 15px; font-family: monospace; font-size: 12px; border: 1px solid #ffd8b3;
        }
        .stat-val { color: #d35400; font-weight: bold; }

        /* KONTROL INPUTS */
        .controls-row {
            flex: 1; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        
        .slider-wrap {
            height: 100%; width: 50px; background: #f0f2f5; border-radius: 20px; border: 2px solid #e1e4e8;
            position: relative; overflow: hidden;
        }
        .slider-fill-active { position: absolute; width: 100%; background: #ff6b00; bottom: 0; transition: height 0.05s linear; }
        .slider-in {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0;
            cursor: pointer; appearance: slider-vertical; -webkit-appearance: slider-vertical;
        }

        #joy-zone-simple {
            width: 160px; height: 160px; background: #fdf1e7; border-radius: 50%; border: 2px dashed #ffbb80; position: relative;
        }
        
        /* BOTTOM PANEL */
        .bottom-panel { padding: 10px; border-top: 1px solid #eee; }
        .stop-btn {
            width: 100%; padding: 12px; font-size: 14px; font-weight: bold; text-transform: uppercase;
            background: #d9383a; color: white; border: none; border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>GCS USV AHRS</h2>
        <div id="statusLabel" class="status">KONEKSI...</div>
    </div>

    <div class="content-body">
        <div class="video-panel">
            <div class="video-wrapper">
                <iframe id="camFrame" src="about:blank"></iframe>
                <div class="video-overlay">🔴 LIVE CAM</div>
            </div>
            <div class="video-btns">
                <button class="reconnect-btn" onclick="forceReconnectVideo()">🔄 RECONNECT</button>
            </div>
        </div>

        <div class="data-control-panel">
            <div class="ahrs-box">
                <div class="ahrs-sky" id="ahrsVisual"></div>
                <div class="ahrs-overlay">
                    <div class="ship-indi"></div>
                </div>
                <div class="ahrs-text">
                    <span>R: <b id="valRoll">0.0</b>°</span>
                    <span>P: <b id="valPitch">0.0</b>°</span>
                </div>
            </div>

            <div class="data-stats-grid">
                <div>KEMUDI: <b id="txtArah" style="color:#ff6b00">straight</b></div>
                <div>SPEED: <b id="txtSpeed" style="color:#ff6b00">0</b>%</div>
            </div>

            <div class="controls-row">
                <div style="width: 30%; height: 100%; text-align: center;">
                    <div class="slider-wrap">
                        <div class="slider-fill-active" id="sliderFill"></div>
                        <input type="range" class="slider-in" min="0" max="100" value="50" oninput="updateThrottle(this.value)">
                    </div>
                    <div style="font-size:9px; font-weight:bold; margin-top:5px">THROTTLE</div>
                </div>
                
                <div style="width: 65%; height: 100%; text-align: center;">
                    <div id="joy-zone-simple"></div>
                    <div style="font-size:9px; font-weight:bold; margin-top:5px">STEERING</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-panel">
        <button class="stop-btn" onclick="emergencyStop()">🛑 EMERGENCY STOP</button>
    </div>
</div>

<script>
    const BROKER = "broker.emqx.io";
    const PORT = 8084;
    const TOPIC_CTRL = "undip/aterkia/zidan/control";
    const TOPIC_TELE = "undip/aterkia/zidan/telemetry";

    let lastArah = "straight", lastSpeed = 50, sendInterval = null;
    const client = new Paho.MQTT.Client(BROKER, Number(PORT), "gcs_" + Math.random().toString(16).substr(2, 5));

    // --- FIX VIDEO RECOVERY ENGINE (FORCED RECONNECT) ---
    function forceReconnectVideo() {
        const iframe = document.getElementById('camFrame');
        if (iframe) {
            iframe.src = "https://tugasakhiradit.loca.lt/cam/?t=" + Date.now();
        }
    }

    client.onMessageArrived = (msg) => {
        if (msg.destinationName === TOPIC_TELE) {
            const parts = msg.payloadString.split(",");
            if (parts.length === 2) {
                const roll = parseFloat(parts[0]) || 0;
                const pitch = parseFloat(parts[1]) || 0;
                
                document.getElementById("valRoll").innerText = roll.toFixed(1);
                document.getElementById("valPitch").innerText = pitch.toFixed(1);

                const visual = document.getElementById("ahrsVisual");
                if (visual) {
                    const pitchOffset = pitch * 2.2; // Sensitivitas pitch
                    visual.style.transform = `rotate(${-roll}deg) translateY(${pitchOffset}px)`;
                }
            }
        }
    };

    client.onConnectionLost = () => { location.reload(); };

    function connectMQTT() {
        client.connect({ useSSL: true, onSuccess: () => {
            document.getElementById("statusLabel").innerText = "ONLINE";
            document.getElementById("statusLabel").classList.add("connected");
            client.subscribe(TOPIC_TELE);
            forceReconnectVideo(); // Pemicu video saat koneksi control siap
        }});
    }
    connectMQTT();

    function sendData() {
        if (client.isConnected()) {
            const msg = new Paho.MQTT.Message(`${lastArah},${lastSpeed}`);
            msg.destinationName = TOPIC_CTRL;
            client.send(msg);
        }
    }

    function updateThrottle(v) {
        lastSpeed = parseInt(v);
        const fill = document.getElementById("sliderFill");
        if(fill) {
            if(lastSpeed >= 50) { fill.style.bottom = "50%"; fill.style.height = ((lastSpeed-50)) + "%"; }
            else { fill.style.bottom = (lastSpeed) + "%"; fill.style.height = (50-lastSpeed) + "%"; }
        }
        document.getElementById("txtSpeed").innerText = Math.abs((lastSpeed-50)*2);
        if(!sendInterval) sendInterval = setInterval(sendData, 150);
    }

    // Joystick 
    var simpleJoy = {
        create: function(o) {
            var z = o.zone, b = document.createElement("div"), n = document.createElement("div"), isD = false;
            b.style = "position:absolute;width:80px;height:80px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:rgba(255,107,0,0.1);border:2px solid #ff6b00";
            n.style = "width:30px;height:30px;position:absolute;left:23px;top:23px;border-radius:50%;background:#ff6b00;transition:transform 0.05s linear;";
            b.appendChild(n); z.appendChild(b);
            const move = (e) => {
                if(!isD) return;
                const t = e.touches ? e.touches[0] : e, r = b.getBoundingClientRect();
                let dx = t.clientX - (r.left + 40); dx = Math.max(-40, Math.min(40, dx));
                n.style.transform = `translateX(${dx}px)`;
                lastArah = dx < -10 ? "left" : dx > 10 ? "right" : "straight";
                document.getElementById("txtArah").innerText = lastArah;
                if(!sendInterval) sendInterval = setInterval(sendData, 150);
            };
            const end = () => { isD = false; n.style.transform = "translateX(0)"; lastArah="straight"; };
            z.addEventListener("mousedown", () => isD = true); z.addEventListener("touchstart", () => isD = true);
            document.addEventListener("mousemove", move); document.addEventListener("touchmove", move);
            document.addEventListener("mouseup", end); document.addEventListener("touchend", end);
        }
    };
    simpleJoy.create({zone: document.getElementById("joy-zone-simple")});

    function emergencyStop() { lastArah = "straight"; lastSpeed = 50; location.reload(); }
</script>
</body>
</html>
