<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCS Kapal USV - Tugas Akhir</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f5f7; color: #333; margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none;
            touch-action: none; 
        }
        .container {
            width: 100%; max-width: 420px; background: #ffffff; padding: 12px;
            border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); text-align: center;
            border: 1px solid #e1e4e8;
        }
        h2 { color: #ff6b00; margin: 0 0 2px 0; font-size: 18px; font-weight: 800; }
        .status {
            display: inline-block; padding: 4px 12px; border-radius: 15px;
            font-weight: bold; font-size: 11px; background-color: #d9383a; color: #fff; margin-bottom: 8px; transition: 0.3s;
        }
        .connected { background-color: #2ed573; color: #fff; }
        
        /* --- Video Stream Box (Tema Putih-Oranye) --- */
        .video-container {
            width: 100%; height: 200px; background-color: #000; border-radius: 12px;
            margin-bottom: 8px; overflow: hidden; position: relative; border: 2px solid #ff6b00;
        }
        .video-overlay {
            position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6);
            padding: 3px 6px; border-radius: 4px; font-size: 10px; font-family: monospace;
            color: #ff9f43; pointer-events: none; z-index: 10;
        }
        .video-container iframe {
            width: 100%; height: 100%; border: none; background: #000;
        }

        /* Tombol Reconnect Terintegrasi Warna Oranye */
        .refresh-video-btn {
            width: 100%; background: #fff5ed; color: #ff6b00; border: 1px solid #ffbb80;
            padding: 6px; border-radius: 8px; font-size: 11px; font-weight: bold;
            cursor: pointer; margin-bottom: 10px; transition: 0.2s;
        }
        .refresh-video-btn:active { background: #ff6b00; color: white; border-color: #ff6b00; }

        .data-display {
            display: flex; justify-content: space-around; background: #fdf1e7;
            padding: 8px; border-radius: 10px; margin-bottom: 10px; font-family: monospace; font-size: 12px;
            border: 1px solid #ffd8b3;
        }
        .val { color: #d35400; font-weight: bold; }

        .control-grid {
            display: flex; width: 100%; margin-bottom: 10px; align-items: center; justify-content: space-between;
        }
        .col-slider { width: 30%; text-align: center; }
        .col-joystick { width: 65%; text-align: center; }

        /* Bidirectional Slider Kontras Tinggi */
        .slider-wrapper {
            height: 150px; width: 40px; display: inline-block; position: relative;
            background: #f0f2f5; border-radius: 20px; border: 2px solid #e1e4e8; overflow: hidden;
        }
        .slider-fill-track {
            position: absolute; left: 0; width: 100%; background: #ff6b00;
            box-shadow: 0 0 8px rgba(255, 107, 0, 0.4);
        }
        .slider-vertical {
            position: absolute; top: 0; left: 0; width: 40px; height: 150px; margin: 0;
            opacity: 0; cursor: pointer; writing-mode: bt-lr; appearance: slider-vertical; -webkit-appearance: slider-vertical; z-index: 3;
        }
        .slider-knob {
            position: absolute; left: 50%; width: 34px; height: 34px; background: #ffffff;
            border: 4px solid #ff6b00; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 4;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .control-label { font-size: 10px; color: #666; margin-top: 4px; font-weight: bold; letter-spacing: 1px; }

        /* Area Ring Joystick Kustom Oranye */
        #joystick-zone {
            width: 150px; height: 150px; background: #fdf1e7; margin: 0 auto;
            border-radius: 50%; position: relative; border: 2px dashed #ffbb80;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.05); touch-action: none;
        }
        
        button.stop-btn {
            width: 100%; padding: 12px; font-size: 14px; font-weight: bold;
            background-color: #d9383a; color: white; border: none; border-radius: 10px;
            cursor: pointer; box-shadow: 0 4px 12px rgba(217, 56, 58, 0.3);
        }
        button.stop-btn:active { background-color: #b32b2d; }
    </style>
</head>
<body>

<div class="container">
    <h2>GCS UTAMA - KAPAL USV</h2>
    <p style="margin: 0 0 6px 0; color:#666; font-size: 11px;">Waduk Sinyal-Stabilized & High Visibility</p>
    
    <div id="statusLabel" class="status">MENGHUBUNGKAN MQTT...</div>
    
    <div class="video-container">
        <iframe id="camFrame" src="https://tugasakhiradit.loca.lt/cam/" allow="autoplay; fullscreen"></iframe>
        <div class="video-overlay" id="videoStatus">🔴 LIVE WEBRTC CAM</div>
    </div>

    <button class="refresh-video-btn" onclick="forceReconnectVideo()">🔄 RECONNECT VIDEO (MANUAL)</button>

    <div class="data-display">
        <div>KEMUDI: <span id="txtArah" class="val">straight</span></div>
        <div>THROTTLE: <span id="txtSpeed" class="val">0</span>% (<span id="txtStatusMotor" style="color: #d35400;">DIAM</span>)</div>
    </div>

    <div class="control-grid">
        <div class="col-slider">
            <div class="slider-wrapper">
                <div id="sliderFill" class="slider-fill-track"></div>
                <div id="sliderKnob" class="slider-knob"></div>
                <input type="range" id="throttleSlider" class="slider-vertical" min="0" max="100" value="50" oninput="updateSliderThrottle(this.value)">
            </div>
            <div class="control-label">THROTTLE</div>
        </div>
        
        <div class="col-joystick">
            <div id="joystick-zone"></div>
            <div class="control-label" style="margin-top: 4px;">STEERING (TOUCH CHIP)</div>
        </div>
    </div>

    <button class="stop-btn" onclick="emergencyStop()">🛑 EMERGENCY STOP</button>
</div>

<script>
    const BROKER_HOST = "broker.emqx.io";
    const BROKER_PORT = 8084; 
    const TOPIC = "undip/aterkia/zidan/control";

    let lastArah = "straight"; let lastSpeed = 50; let sendInterval = null;
    const statusLabel = document.getElementById("statusLabel");

    const clientId = "web_gcs_" + Math.random().toString(16).substr(2, 8);
    const client = new Paho.MQTT.Client(BROKER_HOST, Number(BROKER_PORT), clientId);

    function forceReconnectVideo() {
        const iframe = document.getElementById('camFrame');
        const overlay = document.getElementById('videoStatus');
        overlay.innerText = "🔄 RESETTING TEROWONGAN VIDEO...";
        overlay.style.color = "#d35400";
        
        iframe.src = "https://tugasakhiradit.loca.lt/cam/?t=" + new Date().getTime();
        
        setTimeout(() => {
            overlay.innerText = "🔴 LIVE WEBRTC CAM";
            overlay.style.color = "#ff9f43";
        }, 1500);
    }

    window.addEventListener('online', () => {
        forceReconnectVideo();
    });

    client.onConnectionLost = (responseObject) => { 
        statusLabel.innerText = "KONEKSI TERPUTUS"; 
        statusLabel.className = "status"; 
        statusLabel.style.backgroundColor = "#d9383a";
        setTimeout(eksekusiKoneksiMQTT, 3000);
    };

    function eksekusiKoneksiMQTT() {
        statusLabel.innerText = "MENGHUBUNGKAN MQTT...";
        statusLabel.className = "status";
        statusLabel.style.backgroundColor = "#d9383a";
        
        client.connect({
            useSSL: true,
            timeout: 5,
            onSuccess: () => { 
                statusLabel.innerText = "ONLINE (CONTROL & VIDEO READY)"; 
                statusLabel.className = "status connected"; 
            },
            onFailure: (error) => { 
                statusLabel.innerText = "KONEKSI GAGAL"; 
                statusLabel.className = "status"; 
                statusLabel.style.backgroundColor = "#d9383a";
                setTimeout(eksekusiKoneksiMQTT, 5000);
            }
        });
    }

    eksekusiKoneksiMQTT();

    function kirimDataMQTT(payload) { 
        if (client && client.isConnected()) { 
            const message = new Paho.MQTT.Message(payload); 
            message.destinationName = TOPIC; 
            client.send(message); 
        } 
    }
    
    function picuLoopPengiriman() { 
        if (!sendInterval) { 
            sendInterval = setInterval(() => { 
                kirimDataMQTT(`${lastArah},${lastSpeed}`); 
            }, 120); 
        } 
    }

    function updateSliderThrottle(val) {
        let rawValue = parseInt(val); lastSpeed = rawValue;
        let displayPercent = 0; let statusMotor = "DIAM";
        const fillElement = document.getElementById("sliderFill");
        const knobElement = document.getElementById("sliderKnob");
        
        let knobTopPos = 150 - (rawValue * 1.5);
        knobElement.style.top = knobTopPos + "px";

        if (rawValue > 50) {
            displayPercent = (rawValue - 50) * 2; statusMotor = "MAJU";
            fillElement.style.top = (150 - (rawValue * 1.5)) + "px";
            fillElement.style.height = ((rawValue - 50) * 1.5) + "px";
        } else if (rawValue < 50) {
            displayPercent = (50 - rawValue) * 2; statusMotor = "MUNDUR";
            fillElement.style.top = "75px";
            fillElement.style.height = ((50 - rawValue) * 1.5) + "px";
        } else {
            displayPercent = 0; statusMotor = "DIAM";
            fillElement.style.top = "75px"; fillElement.style.height = "0px";
        }
        document.getElementById("txtSpeed").innerText = displayPercent;
        document.getElementById("txtStatusMotor").innerText = statusMotor;
        picuLoopPengiriman();
    }

    var nipplejs = {
        create: function (options) {
            var zone = options.zone; 
            var box = document.createElement("div");
            box.style.position = "absolute"; box.style.width = "100px"; box.style.height = "100px"; box.style.left = "50%"; box.style.top = "50%"; box.style.transform = "translate(-50%, -50%)";
            box.style.borderRadius = "50%"; box.style.background = "rgba(255, 107, 0, 0.1)"; box.style.border = "2px solid #ff6b00";
            
            var nipple = document.createElement("div");
            nipple.style.width = "40px"; nipple.style.height = "40px"; nipple.style.position = "absolute"; nipple.style.left = "28px"; nipple.style.top = "28px"; nipple.style.borderRadius = "50%";
            nipple.style.background = "#ff6b00"; nipple.style.boxShadow = "0 4px 10px rgba(255,107,0,0.3)";
            
            box.appendChild(nipple); 
            zone.appendChild(box); 
            
            var isDragging = false;
            var callbacks = {};

            var moveHandler = function (e) {
                if (!isDragging) return; 
                var touch = e.touches ? e.touches[0] : e;
                var rect = box.getBoundingClientRect();
                var deltaX = touch.clientX - (rect.left + 50);
                var deltaY = touch.clientY - (rect.top + 50);
                var distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                
                if (distance > 50) { deltaX = (deltaX / distance) * 50; deltaY = (deltaY / distance) * 50; }
                nipple.style.transform = "translate(" + deltaX + "px, " + deltaY + "px)";
                
                var directionX = "straight";
                if (deltaX < -12) directionX = "left";
                else if (deltaX > 12) directionX = "right";
                
                if (callbacks["move"]) callbacks["move"](null, { direction: { x: directionX } });
            };

            var endHandler = function () {
                if (!isDragging) return;
                isDragging = false;
                nipple.style.transform = "translate(0px, 0px)";
                if (callbacks["end"]) callbacks["end"]();
            };

            zone.addEventListener("mousedown", function (e) { isDragging = true; moveHandler(e); });
            document.addEventListener("mousemove", moveHandler);
            document.addEventListener("mouseup", endHandler);

            zone.addEventListener("touchstart", function (e) { isDragging = true; moveHandler(e); }, { passive: true });
            document.addEventListener("touchmove", moveHandler, { passive: false });
            document.addEventListener("touchend", endHandler);

            return { on: function (evt, cb) { callbacks[evt] = cb; } };
        }
    };

    const joyManager = nipplejs.create({ zone: document.getElementById('joystick-zone') });
    joyManager.on('move', (evt, data) => { 
        if (!data.direction) return; 
        let arah = data.direction.x || "straight"; 
        document.getElementById("txtArah").innerText = arah; 
        lastArah = arah; 
        picuLoopPengiriman(); 
    });
    joyManager.on('end', () => { 
        lastArah = "straight"; 
        document.getElementById("txtArah").innerText = "straight"; 
        picuLoopPengiriman(); 
    });

    function emergencyStop() {
        clearInterval(sendInterval); sendInterval = null; lastArah = "straight"; lastSpeed = 50;
        document.getElementById("throttleSlider").value = 50;
        document.getElementById("sliderFill").style.top = "75px"; document.getElementById("sliderFill").style.height = "0px"; document.getElementById("sliderKnob").style.top = "75px";
        document.getElementById("txtArah").innerText = "straight"; document.getElementById("txtSpeed").innerText = "0"; document.getElementById("txtStatusMotor").innerText = "DIAM";
        kirimDataMQTT("straight,50");
    }

    window.onload = function() {
        updateSliderThrottle(50);
    };
</script>
</body>
</html>
