<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCS Kapal USV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none; touch-action: none; 
        }
        .container {
            width: 100%; max-width: 420px; background: #ffffff; padding: 15px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; border: 1px solid #e1e4e8;
        }
        h2 { color: #ff6b00; margin: 0 0 10px 0; font-size: 20px; font-weight: 800; }
        .status {
            display: inline-block; padding: 5px 15px; border-radius: 20px;
            font-weight: bold; font-size: 12px; background-color: #d9383a; color: #fff; margin-bottom: 12px;
        }
        .connected { background-color: #2ed573; color: #fff; }
        
        /* Video */
        .video-container {
            width: 100%; height: 210px; background-color: #000; border-radius: 12px;
            margin-bottom: 10px; overflow: hidden; position: relative; border: 2px solid #ff6b00;
        }
        .video-overlay {
            position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6);
            padding: 4px 8px; border-radius: 5px; font-size: 11px; font-family: monospace; color: #ff9f43; z-index: 10;
        }
        .video-container iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* Tombol Reconnect Bersih */
        .refresh-video-btn {
            width: 100%; background: #fff5ed; color: #ff6b00; border: 1px solid #ffbb80;
            padding: 8px; border-radius: 10px; font-size: 12px; font-weight: bold;
            cursor: pointer; margin-bottom: 12px;
        }
        .refresh-video-btn:active { background: #ff6b00; color: white; }

        /* Data */
        .data-display {
            display: flex; justify-content: space-around; background: #fdf1e7;
            padding: 10px; border-radius: 10px; margin-bottom: 12px; font-family: monospace; font-size: 13px; border: 1px solid #ffd8b3;
        }
        .val { color: #d35400; font-weight: bold; }

        /* Kontrol */
        .control-grid { display: flex; width: 100%; margin-bottom: 12px; align-items: center; justify-content: space-between; }
        .col-slider { width: 30%; text-align: center; }
        .col-joystick { width: 65%; text-align: center; }

        .slider-wrapper {
            height: 160px; width: 45px; display: inline-block; position: relative;
            background: #f0f2f5; border-radius: 20px; border: 2px solid #e1e4e8; overflow: hidden;
        }
        .slider-fill-track { position: absolute; left: 0; width: 100%; background: #ff6b00; }
        .slider-vertical {
            position: absolute; top: 0; left: 0; width: 45px; height: 160px; margin: 0;
            opacity: 0; cursor: pointer; writing-mode: bt-lr; appearance: slider-vertical; -webkit-appearance: slider-vertical; z-index: 3;
        }
        .slider-knob {
            position: absolute; left: 50%; width: 38px; height: 38px; background: #ffffff;
            border: 4px solid #ff6b00; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 4;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        .control-label { font-size: 11px; color: #555; margin-top: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        #joystick-zone {
            width: 160px; height: 160px; background: #fdf1e7; margin: 0 auto;
            border-radius: 50%; position: relative; border: 2px dashed #ffbb80; touch-action: none;
        }
        
        /* Emergency */
        button.stop-btn {
            width: 100%; padding: 15px; font-size: 16px; font-weight: bold; text-transform: uppercase;
            background-color: #d9383a; color: white; border: none; border-radius: 12px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(217, 56, 58, 0.3);
        }
        button.stop-btn:active { background-color: #b32b2d; }
    </style>
</head>
<body>

<div class="container">
    <h2>GCS UTAMA - KAPAL USV</h2>
    
    <div id="statusLabel" class="status">KONEKSI...</div>
    
    <div class="video-container">
        <iframe id="camFrame" src="about:blank" allow="autoplay; fullscreen"></iframe>
        <div class="video-overlay">🔴 LIVE CAM</div>
    </div>

    <button class="refresh-video-btn" onclick="forceReconnectVideo()">🔄 RECONNECT</button>

    <div class="data-display">
        <div>KEMUDI: <span id="txtArah" class="val">straight</span></div>
        <div>THROTTLE: <span id="txtSpeed" class="val">0</span>% (<span id="txtStatusMotor" style="color: #d35400;">DIAM</span>)</div>
    </div>

    <div class="control-grid">
        <div class="col-slider">
            <div class="slider-wrapper">
                <div id="sliderFill" class="slider-fill-track"></div>
                <div id="sliderKnob" class="slider-knob"></div>
                <input type="range" id="throttleSlider" class="slider-vertical" min="0" max="100" value="50" oninput="updateSliderThrottle(this.value)">
            </div>
            <div class="control-label">THROTTLE</div>
        </div>
        
        <div class="col-joystick">
            <div id="joystick-zone"></div>
            <div class="control-label">STEERING</div>
        </div>
    </div>

    <button class="stop-btn" onclick="emergencyStop()">🛑 EMERGENCY STOP</button>
</div>

<script>
    const BROKER_HOST = "broker.emqx.io";
    const BROKER_PORT = 8084; 
    const TOPIC = "undip/aterkia/zidan/control";

    let lastArah = "straight"; let lastSpeed = 50; let sendInterval = null;
    const statusLabel = document.getElementById("statusLabel");

    const clientId = "web_gcs_" + Math.random().toString(16).substr(2, 8);
    const client = new Paho.MQTT.Client(BROKER_HOST, Number(BROKER_PORT), clientId);

    // --- FIX VIDEO 503 ENGINE ---
    // Paksa browser menembak ulang jalur LocalTunnel dengan bypass cache total saat GCS dibuka.
    function forceReconnectVideo() {
        const iframe = document.getElementById('camFrame');
        const overlay = document.querySelector('.video-overlay');
        const originalOverlay = overlay.innerText;
        overlay.innerText = "🔄 RESETTING...";
        iframe.src = "https://tugasakhiradit.loca.lt/cam/?t=" + new Date().getTime();
        setTimeout(() => { overlay.innerText = originalOverlay; }, 1500);
    }

    // Sambungkan video saat halaman selesai load
    window.onload = function() {
        forceReconnectVideo();
        updateSliderThrottle(50);
    };

    window.addEventListener('online', forceReconnectVideo);

    // --- MQTT & LOGIC (MODIFIED) ---
    client.onConnectionLost = (rc) => { 
        statusLabel.innerText = "TERPUTUS"; statusLabel.className = "status"; 
        setTimeout(eksekusiKoneksiMQTT, 3000);
    };

    function eksekusiKoneksiMQTT() {
        statusLabel.innerText = "KONEKSI..."; statusLabel.className = "status";
        client.connect({
            useSSL: true, timeout: 5,
            onSuccess: () => { statusLabel.innerText = "ONLINE"; statusLabel.className = "status connected"; },
            onFailure: () => { setTimeout(eksekusiKoneksiMQTT, 5000); }
        });
    }

    eksekusiKoneksiMQTT();

    function kirimDataMQTT(payload) { 
        if (client && client.isConnected()) { 
            client.send(new Paho.MQTT.Message(payload) {{ destinationName: TOPIC }}); 
        } 
    }
    
    function picuLoopPengiriman() { 
        if (!sendInterval) { sendInterval = setInterval(() => { kirimDataMQTT(`${lastArah},${lastSpeed}`); }, 120); } 
    }

    function updateSliderThrottle(val) {
        let rawValue = parseInt(val); lastSpeed = rawValue;
        let displayPercent = 0; let statusMotor = "DIAM";
        const fill = document.getElementById("sliderFill");
        const knob = document.getElementById("sliderKnob");
        
        knob.style.top = (160 - (rawValue * 1.6)) + "px";

        if (rawValue > 50) {
            displayPercent = (rawValue - 50) * 2; statusMotor = "MAJU";
            fill.style.top = (160 - (rawValue * 1.6)) + "px"; fill.style.height = ((rawValue - 50) * 1.6) + "px";
        } else if (rawValue < 50) {
            displayPercent = (50 - rawValue) * 2; statusMotor = "MUNDUR";
            fill.style.top = "80px"; fill.style.height = ((50 - rawValue) * 1.6) + "px";
        } else {
            fill.style.top = "80px"; fill.style.height = "0px";
        }
        document.getElementById("txtSpeed").innerText = displayPercent;
        document.getElementById("txtStatusMotor").innerText = statusMotor;
        picuLoopPengiriman();
    }

    // Joystick 
    var nipplejs = {
        create: function (opts) {
            var zone = opts.zone; 
            var box = document.createElement("div");
            box.style.position = "absolute"; box.style.width = "100px"; box.style.height = "100px"; box.style.left = "50%"; box.style.top = "50%"; box.style.transform = "translate(-50%, -50%)";
            box.style.borderRadius = "50%"; box.style.background = "rgba(255, 107, 0, 0.1)"; box.style.border = "2px solid #ff6b00";
            
            var nip = document.createElement("div");
            nip.style.width = "40px"; nip.style.height = "40px"; nip.style.position = "absolute"; nip.style.left = "28px"; nip.style.top = "28px"; nip.style.borderRadius = "50%";
            nip.style.background = "#ff6b00"; box.appendChild(nip); zone.appendChild(box); 
            
            var isDrag = false; var cb = {};

            var handler = function (e) {
                if (!isDrag) return; 
                var t = e.touches ? e.touches[0] : e;
                var r = box.getBoundingClientRect();
                var dx = t.clientX - (r.left + 50);
                var dy = t.clientY - (r.top + 50);
                var d = Math.sqrt(dx * dx + dy * dy);
                
                if (d > 50) { dx = (dx / d) * 50; dx = dx; }
                nip.style.transform = "translate(" + dx + "px, " + dy + "px)";
                var xA = "straight"; if (dx < -12) xA = "left"; else if (dx > 12) xA = "right";
                if (cb["move"]) cb["move"](xA);
            };

            zone.addEventListener("mousedown", (e) => { isDrag = true; handler(e); });
            document.addEventListener("mousemove", handler);
            document.addEventListener("mouseup", () => { if(isDrag){ isDrag = false; nip.style.transform = "translate(0px, 0px)"; if(cb["end"])cb["end"](); } });
            zone.addEventListener("touchstart", (e) => { isDrag = true; handler(e); });
            document.addEventListener("touchmove", handler);
            document.addEventListener("touchend", () => { if(isDrag){ isDrag = false; nip.style.transform = "translate(0px, 0px)"; if(cb["end"])cb["end"](); } });
            return { on: (e, c) => { cb[e] = c; } };
        }
    };

    const joy = nipplejs.create({ zone: document.getElementById('joystick-zone') });
    joy.on('move', (arah) => { document.getElementById("txtArah").innerText = arah; lastArah = arah; picuLoopPengiriman(); });
    joy.on('end', () => { lastArah = "straight"; document.getElementById("txtArah").innerText = "straight"; picuLoopPengiriman(); });

    function emergencyStop() {
        clearInterval(sendInterval); sendInterval = null; lastArah = "straight"; lastSpeed = 50;
        document.getElementById("throttleSlider").value = 50; updateSliderThrottle(50);
        kirimDataMQTT("straight,50");
    }
</script>
</body>
</html>
