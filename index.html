<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCS Aterkia USV - Zidan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1c1e;
            color: #e3e2e6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #334455;
        }

        header h1 {
            font-size: 24px;
            color: #4791ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-bar {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            margin-top: 5px;
            background-color: #ba1a1a;
            color: white;
        }

        .online {
            background-color: #006a4e;
        }

        .main-container {
            display: table;
            width: 100%;
            border-collapse: separate;
            border-spacing: 15px;
        }

        .row {
            display: table-row;
        }

        .video-panel, .telemetry-panel {
            display: table-cell;
            vertical-align: top;
            background-color: #24262a;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .video-panel {
            width: 60%;
        }

        .telemetry-panel {
            width: 40%;
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #8cb4f9;
            border-left: 4px solid #4791ff;
            padding-left: 10px;
        }

        /* Pembungkus Iframe Video Spek Raspi */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* Rasio 4:3 sesuai resolusi 320x240 */
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #3f4752;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn-reconnect {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background-color: #4791ff;
            color: #002f6c;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .btn-reconnect:hover {
            background-color: #8cb4f9;
        }

        /* Widget Parameter Sensor MPU */
        .widget-grid {
            display: table;
            width: 100%;
            border-collapse: separate;
            border-spacing: 10px;
        }

        .widget-row {
            display: table-row;
        }

        .widget-card {
            display: table-cell;
            background-color: #1a1c1e;
            border: 1px solid #3f4752;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            width: 33.33%;
        }

        .widget-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #939099;
            margin-bottom: 5px;
        }

        .widget-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
        }

        .unit {
            font-size: 12px;
            font-weight: normal;
            color: #8cb4f9;
            margin-left: 2px;
        }

        .log-panel {
            margin-top: 15px;
            background-color: #1a1c1e;
            border: 1px solid #3f4752;
            border-radius: 8px;
            padding: 10px;
            height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #00ff66;
        }
    </style>
</head>
<body>

    <header>
        <h1>Aterkia USV - Ground Control Station</h1>
        <div id="statusMqtt" class="status-bar">DISCONNECTED</div>
    </header>

    <div class="main-container">
        <div class="row">
            
            <div class="video-panel">
                <div class="panel-title">LIVE CAMERA STREAM (LOCALTONET MULTIPART)</div>
                <div class="video-wrapper">
                    <iframe id="camFrame" src="https://3bovjczenb.localto.net/video_feed"></iframe>
                </div>
                <button class="btn-reconnect" onclick="forceReconnectVideo()">🔄 RECONNECT VIDEO STREAM</button>
            </div>

            <div class="telemetry-panel">
                <div class="panel-title">REAL-TIME TELEMETRY (MPU-6050)</div>
                
                <div class="widget-grid">
                    <div class="widget-row">
                        <div class="widget-card">
                            <div class="widget-label">Sudut Roll</div>
                            <div class="widget-value"><span id="txtRoll">0.0</span><span class="unit">°</span></div>
                        </div>
                        <div class="widget-card">
                            <div class="widget-label">Sudut Pitch</div>
                            <div class="widget-value"><span id="txtPitch">0.0</span><span class="unit">°</span></div>
                        </div>
                        <div class="widget-card">
                            <div class="widget-label">Yaw Rate</div>
                            <div class="widget-value"><span id="txtYawRate">0.0</span><span class="unit">°/s</span></div>
                        </div>
                    </div>
                </div>

                <div class="panel-title" style="margin-top: 25px;">CONSOLE LOGS</div>
                <div id="consoleLog" class="log-panel">Menunggu koneksi data dari kapal USV...<br></div>
            </div>

        </div>
    </div>

    <script type="text/javascript">
        // --- KONFIGURASI MQTT NETWORK ---
        const BROKER = "broker.emqx.io";
        const PORT = 8083; // Port Mqtt via WebSockets (Wajib untuk HTML Browser)
        const CLIENT_ID = "gcs_zidan_" + Math.random().toString(16).substr(2, 8);
        const TOPIC_TELEMETRY = "undip/aterkia/zidan/telemetry";

        // Variabel global pengunci link video statis
        const LINK_VIDEO_STATIS = "https://3bovjczenb.localto.net/video_feed";

        // Inisialisasi Paho MQTT Client
        const client = new Paho.MQTT.Client(BROKER, PORT, CLIENT_ID);

        client.onConnectionLost = onConnectionLost;
        client.onMessageArrived = onMessageArrived;

        // Menghubungkan GCS ke Broker EMQX
        function hubungkanMqtt() {
            logKeConsole("Mencoba terhubung ke Broker EMQX: " + BROKER);
            client.connect({
                onSuccess: onConnect,
                onFailure: onFailure,
                keepAliveInterval: 30,
                useSSL: false
            });
        }

        function onConnect() {
            logKeConsole("✅ Terhubung Sempurna ke MQTT Broker!");
            const statusBar = document.getElementById("statusMqtt");
            statusBar.innerText = "ONLINE";
            statusBar.className = "status-bar online";
            
            // Subscribe ke topik telemetri numerik kapal
            client.subscribe(TOPIC_TELEMETRY);
            logKeConsole("Subscribed ke topik: " + TOPIC_TELEMETRY);
        }

        function onFailure(response) {
            logKeConsole("❌ Gagal Terhubung: " + response.errorMessage);
            setTimeout(hubungkanMqtt, 5000); // Auto-reconnect jika internet down
        }

        function onConnectionLost(responseObject) {
            logKeConsole("⚠️ Koneksi Putus: " + responseObject.errorMessage);
            const statusBar = document.getElementById("statusMqtt");
            statusBar.innerText = "DISCONNECTED";
            statusBar.className = "status-bar";
            setTimeout(hubungkanMqtt, 5000);
        }

        // Penanganan Pemotongan Data (Parsing 3 Variabel Numerik)
        function onMessageArrived(msg) {
            if (msg.destinationName === TOPIC_TELEMETRY) {
                const payload = msg.payloadString;
                const parts = payload.split(",");
                
                // Memastikan payload murni berisi 3 data numerik: ROLL, PITCH, YAW_RATE
                if (parts.length === 3) {
                    document.getElementById("txtRoll").innerText = parseFloat(parts[0]).toFixed(1);
                    document.getElementById("txtPitch").innerText = parseFloat(parts[1]).toFixed(1);
                    document.getElementById("txtYawRate").innerText = parseFloat(parts[2]).toFixed(1);
                } else {
                    logKeConsole("[RAW DATA]: " + payload);
                }
            }
        }

        // Fungsi Tombol Reconnect Video (Pencegah Cache Macet Jaringan Seluler)
        function forceReconnectVideo() {
            // Ditambahkan parameter timestamp acak (?t=...) agar browser dipaksa mendownload frame baru
            document.getElementById('camFrame').src = LINK_VIDEO_STATIS + "?t=" + Date.now();
            logKeConsole("🔄 Menyegarkan jalur video feed LocalToNet...");
        }

        function logKeConsole(pesan) {
            const consoleBox = document.getElementById("consoleLog");
            const waktu = new Date().toLocaleTimeString();
            consoleBox.innerHTML += `[${waktu}] ${pesan}<br>`;
            consoleBox.scrollTop = consoleBox.scrollHeight; // Auto scroll ke bawah
        }

        // Jalankan koneksi MQTT saat halaman web pertama kali dibuka
        window.onload = () => {
            hubungkanMqtt();
        };
    </script>
</body>
</html>
