<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCS USV AHRS SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 420px; background: #fff; padding: 15px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; border: 1px solid #e1e4e8;
        }
        h2 { color: #ff6b00; margin: 0 0 10px 0; font-size: 18px; font-weight: 800; }
        .status {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-weight: bold; font-size: 11px; background-color: #d9383a; color: #fff; margin-bottom: 10px;
        }
        .connected { background-color: #2ed573; }

        /* --- VISUAL AHRS (ARTIFICIAL HORIZON) --- */
        .ahrs-container {
            width: 100%; height: 160px; background: #333; border-radius: 15px;
            margin-bottom: 12px; position: relative; overflow: hidden; border: 3px solid #ff6b00;
        }
        .ahrs-sky {
            position: absolute; width: 200%; height: 400%; top: -150%; left: -50%;
            background: linear-gradient(to bottom, #4cc9f0 50%, #8b4513 50%);
            transition: transform 0.1s linear; /* Membuat pergerakan sangat halus */
        }
        .ahrs-overlay {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; align-items: center; justify-content: center; pointer-events: none;
        }
        .ship-indicator {
            width: 60%; height: 2px; background: #ff6b00; position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .ship-indicator::after {
            content: ''; position: absolute; width: 10px; height: 10px; 
            border: 2px solid #ff6b00; border-radius: 50%; left: 50%; top: -5px; transform: translateX(-50%);
        }
        .ahrs-text {
            position: absolute; bottom: 5px; width: 100%; display: flex; 
            justify-content: space-around; color: white; font-family: monospace; font-size: 10px;
            text-shadow: 1px 1px 2px black;
        }

        /* Video */
        .video-container {
            width: 100%; height: 160px; background-color: #000; border-radius: 12px;
            margin-bottom: 10px; overflow: hidden; position: relative; border: 1px solid #ccc;
        }
        .video-container iframe { width: 100%; height: 100%; border: none; }

        /* Buttons & Data */
        .refresh-btn {
            width: 100%; background: #fff5ed; color: #ff6b00; border: 1px solid #ffbb80;
            padding: 8px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        .data-grid {
            display: flex; justify-content: space-around; background: #fdf1e7;
            padding: 8px; border-radius: 10px; margin-bottom: 12px; font-family: monospace; font-size: 11px;
        }
        .control-grid { display: flex; width: 100%; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        /* Slider & Joystick */
        .slider-wrapper {
            height: 140px; width: 45px; background: #f0f2f5; border-radius: 20px; border: 2px solid #e1e4e8;
            position: relative; overflow: hidden;
        }
        .slider-fill { position: absolute; width: 100%; background: #ff6b00; bottom: 0; }
        .slider-vertical {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0;
            cursor: pointer; appearance: slider-vertical; -webkit-appearance: slider-vertical;
        }
        #joystick-zone { width: 140px; height: 140px; background: #fdf1e7; border-radius: 50%; border: 2px dashed #ffbb80; position: relative; }
        
        .stop-btn {
            width: 100%; padding: 15px; font-size: 16px; font-weight: bold; background: #d9383a;
            color: white; border: none; border-radius: 12px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GCS AHRS - USV SHIP</h2>
    <div id="statusLabel" class="status">CONNECTING...</div>

    <div class="ahrs-container">
        <div class="ahrs-sky" id="ahrsVisual"></div>
        <div class="ahrs-overlay">
            <div class="ship-indicator"></div>
        </div>
        <div class="ahrs-text">
            <span>R: <b id="valRoll">0.0</b>°</span>
            <span>P: <b id="valPitch">0.0</b>°</span>
        </div>
    </div>

    <div class="video-container">
        <iframe id="camFrame" src="about:blank"></iframe>
    </div>
    
    <button class="refresh-btn" onclick="forceReconnectVideo()">🔄 RECONNECT VIDEO</button>

    <div class="data-grid">
        <div>KEMUDI: <b id="txtArah" style="color:#ff6b00">straight</b></div>
        <div>SPEED: <b id="txtSpeed" style="color:#ff6b00">0</b>%</div>
    </div>

    <div class="control-grid">
        <div style="width: 30%">
            <div class="slider-wrapper">
                <div class="slider-fill" id="sliderFill"></div>
                <input type="range" class="slider-vertical" min="0" max="100" value="50" oninput="updateThrottle(this.value)">
            </div>
            <div style="font-size:10px; font-weight:bold; margin-top:5px">THROTTLE</div>
        </div>
        
        <div style="width: 65%">
            <div id="joystick-zone"></div>
            <div style="font-size:10px; font-weight:bold; margin-top:5px">STEERING</div>
        </div>
    </div>

    <button class="stop-btn" onclick="emergencyStop()">🛑 EMERGENCY STOP</button>
</div>

<script>
    const BROKER = "broker.emqx.io";
    const PORT = 8084;
    const TOPIC_CTRL = "undip/aterkia/zidan/control";
    const TOPIC_TELE = "undip/aterkia/zidan/telemetry";

    let lastArah = "straight", lastSpeed = 50, sendInterval = null;
    const client = new Paho.MQTT.Client(BROKER, Number(PORT), "gcs_client_" + Math.random().toString(16).substr(2, 5));

    function forceReconnectVideo() {
        document.getElementById('camFrame').src = "https://tugasakhiradit.loca.lt/cam/?t=" + Date.now();
    }

    client.onMessageArrived = (msg) => {
        if (msg.destinationName === TOPIC_TELE) {
            const [roll, pitch] = msg.payloadString.split(",").map(parseFloat);
            
            // UPDATE TEXT
            document.getElementById("valRoll").innerText = roll.toFixed(1);
            document.getElementById("valPitch").innerText = pitch.toFixed(1);

            // --- UPDATE VISUAL AHRS ---
            // Roll: Memutar background (dikali -1 agar arah miring sesuai asli)
            // Pitch: Menggeser background naik/turun (1 derajat = sekitar 2 pixel)
            const visual = document.getElementById("ahrsVisual");
            const pitchOffset = pitch * 2.5; 
            visual.style.transform = `rotate(${-roll}deg) translateY(${pitchOffset}px)`;
        }
    };

    client.onConnectionLost = () => { location.reload(); };

    function connect() {
        client.connect({ useSSL: true, onSuccess: () => {
            document.getElementById("statusLabel").innerText = "ONLINE";
            document.getElementById("statusLabel").classList.add("connected");
            client.subscribe(TOPIC_TELE);
            forceReconnectVideo();
        }});
    }
    connect();

    function sendData() {
        if (client.isConnected()) {
            const msg = new Paho.MQTT.Message(`${lastArah},${lastSpeed}`);
            msg.destinationName = TOPIC_CTRL;
            client.send(msg);
        }
    }

    function updateThrottle(v) {
        lastSpeed = parseInt(v);
        const fill = document.getElementById("sliderFill");
        if(lastSpeed >= 50) {
            fill.style.bottom = "50%"; fill.style.height = ((lastSpeed-50)) + "%";
        } else {
            fill.style.bottom = (lastSpeed) + "%"; fill.style.height = (50-lastSpeed) + "%";
        }
        document.getElementById("txtSpeed").innerText = Math.abs((lastSpeed-50)*2);
        if(!sendInterval) sendInterval = setInterval(sendData, 150);
    }

    // Joystick Simple
    var nipplejs = {
        create: function(o) {
            var z = o.zone, b = document.createElement("div"), n = document.createElement("div"), isD = false;
            b.style = "position:absolute;width:80px;height:80px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:rgba(255,107,0,0.1);border:2px solid #ff6b00";
            n.style = "width:30px;height:30px;position:absolute;left:23px;top:23px;border-radius:50%;background:#ff6b00";
            b.appendChild(n); z.appendChild(b);
            const move = (e) => {
                if(!isD) return;
                const t = e.touches ? e.touches[0] : e, r = b.getBoundingClientRect();
                let dx = t.clientX - (r.left + 40);
                dx = Math.max(-40, Math.min(40, dx));
                n.style.transform = `translateX(${dx}px)`;
                lastArah = dx < -10 ? "left" : dx > 10 ? "right" : "straight";
                document.getElementById("txtArah").innerText = lastArah;
                if(!sendInterval) sendInterval = setInterval(sendData, 150);
            };
            z.addEventListener("mousedown", () => isD = true);
            z.addEventListener("touchstart", () => isD = true);
            document.addEventListener("mousemove", move);
            document.addEventListener("touchmove", move);
            document.addEventListener("mouseup", () => { isD = false; n.style.transform = "translateX(0)"; lastArah="straight"; });
            document.addEventListener("touchend", () => { isD = false; n.style.transform = "translateX(0)"; lastArah="straight"; });
        }
    };
    nipplejs.create({zone: document.getElementById("joystick-zone")});

    function emergencyStop() {
        lastArah = "straight"; lastSpeed = 50;
        location.reload();
    }
</script>
</body>
</html>
