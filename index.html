<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCS Aterkia USV - Global Access</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #1a1c1e; color: #e3e2e6; padding: 15px; }
        header { text-align: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #334455; }
        header h1 { font-size: 20px; color: #4791ff; text-transform: uppercase; letter-spacing: 2px; }
        .status-bar { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 11px; margin-top: 5px; background-color: #ba1a1a; color: white; }
        .online { background-color: #006a4e; }
        .main-container { display: flex; flex-direction: column; gap: 15px; }
        @media(min-width: 768px) { .main-container { flex-direction: row; } }
        .panel { flex: 1; background-color: #24262a; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .panel-title { font-size: 13px; font-weight: bold; margin-bottom: 12px; color: #8cb4f9; border-left: 4px solid #4791ff; padding-left: 8px; }
        .video-wrapper { position: relative; width: 100%; padding-bottom: 75%; background-color: #000; border-radius: 8px; overflow: hidden; border: 1px solid #3f4752; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .widget-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .widget-card { flex: 1; background-color: #1a1c1e; border: 1px solid #3f4752; border-radius: 8px; padding: 12px; text-align: center; }
        .widget-label { font-size: 10px; text-transform: uppercase; color: #939099; }
        .widget-value { font-size: 20px; font-weight: bold; color: #ffffff; }
        .unit { font-size: 11px; color: #4791ff; }
        .log-panel { margin-top: 15px; background-color: #1a1c1e; border: 1px solid #3f4752; border-radius: 8px; padding: 10px; height: 100px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #00ff66; }
    </style>
</head>
<body>

    <header>
        <h1>Aterkia USV - Global GCS</h1>
        <div id="statusMqtt" class="status-bar">DISCONNECTED</div>
    </header>

    <div class="main-container">
        <div class="panel">
            <div class="panel-title">LIVE VIDEO MONITOR (GLOBAL ACCESS)</div>
            <div class="video-wrapper">
                <iframe id="camFrame" src="https://aterkia-stream.trycloudflare.com/video_feed"></iframe>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">REAL-TIME TELEMETRY (MPU-6050)</div>
            <div class="widget-grid">
                <div class="widget-card">
                    <div class="widget-label">Roll</div>
                    <div class="widget-value"><span id="txtRoll">0.0</span><span class="unit">°</span></div>
                </div>
                <div class="widget-card">
                    <div class="widget-label">Pitch</div>
                    <div class="widget-value"><span id="txtPitch">0.0</span><span class="unit">°</span></div>
                </div>
                <div class="widget-card">
                    <div class="widget-label">Yaw Rate</div>
                    <div class="widget-value"><span id="txtYawRate">0.0</span><span class="unit">°/s</span></div>
                </div>
            </div>
            <div id="consoleLog" class="log-panel">Menghubungkan ke EMQX Broker Aman...<br></div>
        </div>
    </div>

    <script>
        const logBox = document.getElementById("consoleLog");
        function log(msg) { logBox.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`; logBox.scrollTop = logBox.scrollHeight; }

        // MENGGUNAKAN WEBSOCKET SECURE (WSS) JALUR RESMI PORT 8084 EMQX
        const BROKER_URL = "wss://broker.emqx.io:8084/mqtt";
        const TOPIC_TELEMETRY = "undip/aterkia/zidan/telemetry";

        log("Menghubungkan ke broker beralur SSL aman...");
        const client = mqtt.connect(BROKER_URL, {
            clientId: "gcs_global_" + Math.random().toString(16).substr(2, 8),
            clean: true,
            connectTimeout: 4000
        });

        client.on('connect', () => {
            log("✅ KONEKSI TELEMETRI GLOBAL AKTIF!");
            const sb = document.getElementById("statusMqtt");
            sb.innerText = "ONLINE";
            sb.className = "status-bar online";
            client.subscribe(TOPIC_TELEMETRY);
        });

        client.on('message', (topic, payload) => {
            if (topic === TOPIC_TELEMETRY) {
                const parts = payload.toString().split(",");
                if (parts.length === 3) {
                    document.getElementById("txtRoll").innerText = parseFloat(parts[0]).toFixed(1);
                    document.getElementById("txtPitch").innerText = parseFloat(parts[1]).toFixed(1);
                    document.getElementById("txtYawRate").innerText = parseFloat(parts[2]).toFixed(1);
                }
            }
        });

        client.on('error', (err) => { log("❌ Eror Jaringan: " + err); });
        client.on('close', () => { 
            const sb = document.getElementById("statusMqtt");
            sb.innerText = "DISCONNECTED";
            sb.className = "status-bar";
        });
    </script>
</body>
</html>
