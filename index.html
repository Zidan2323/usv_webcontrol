<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCS USV Telemetry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 8px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        
        .container {
            width: 100%; max-width: 400px; background: #fff; padding: 15px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #e1e4e8; display: flex; flex-direction: column;
        }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        h2 { color: #ff6b00; margin: 0; font-size: 16px; font-weight: 800; text-transform: uppercase; }
        .status { padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 10px; background-color: #d9383a; color: #fff; }
        .connected { background-color: #2ed573; }

        /* LIVE STREAMING VIDEO */
        .video-wrapper {
            width: 100%; height: 180px; background-color: #000; border-radius: 12px; border: 2px solid #ff6b00;
            overflow: hidden; position: relative; margin-bottom: 8px;
        }
        .video-wrapper iframe { width: 100%; height: 100%; border: none; }
        .video-overlay {
            position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6);
            padding: 3px 6px; border-radius: 4px; font-size: 9px; font-family: monospace; color: #ff9f43; z-index: 10;
        }

        .reconnect-btn {
            width: 100%; background: #fff5ed; color: #ff6b00; border: 1px solid #ffbb80;
            padding: 8px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; margin-bottom: 12px;
        }
        .reconnect-btn:active { background: #ff6b00; color: white; }

        /* MPU TELEMETRY WIDGET */
        .mpu-grid { display: flex; gap: 8px; margin-bottom: 12px; }
        .mpu-card { flex: 1; background: #f4f5f7; border: 1px solid #e1e4e8; border-radius: 10px; padding: 8px 4px; text-align: center; }
        .mpu-label { font-size: 9px; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .mpu-val { font-size: 15px; font-weight: bold; color: #2b7de9; font-family: monospace; }

        /* DATA MONITOR MOTOR */
        .data-stats-grid {
            display: flex; justify-content: space-around; background: #fdf1e7;
            padding: 10px; border-radius: 10px; margin-bottom: 15px; font-family: monospace; font-size: 12px; border: 1px solid #ffd8b3;
        }

        /* PANEL KONTROL SEJAJAR (THROTTLE & STEERING) */
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .col-throttle { width: 35%; display: flex; flex-direction: column; align-items: center; }
        
        /* REVISI VISUAL: Jalur Pengisian Bidirectional murni dari tengah */
        .slider-wrap {
            height: 130px; width: 45px; background: #f0f2f5; border-radius: 15px; border: 2px solid #e1e4e8;
            position: relative; overflow: hidden; cursor: pointer;
        }
        .slider-fill-active { position: absolute; width: 100%; background: #ffbb80; bottom: 50%; height: 0%; }
        .slider-knob {
            position: absolute; left: 0; width: 100%; height: 20px; background: #ff6b00;
            border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); bottom: calc(50% - 10px); pointer-events: none; z-index: 5;
        }

        .col-steering { width: 60%; display: flex; flex-direction: column; align-items: center; }
        #joy-zone-simple { width: 130px; height: 130px; background: #fdf1e7; border-radius: 50%; border: 2px dashed #ffbb80; position: relative; }
        .control-label { font-size: 9px; font-weight: bold; margin-top: 5px; text-transform: uppercase; color: #555; letter-spacing: 0.5px; }

        /* EMERGENCY BUTTON */
        .stop-btn {
            width: 100%; padding: 14px; font-size: 14px; font-weight: bold; text-transform: uppercase;
            background: #d9383a; color: white; border: none; border-radius: 10px; cursor: pointer;
        }
        .stop-btn:active { background: #b32b2d; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>GCS TELEMETRY</h2>
        <div id="statusLabel" class="status">KONEKSI...</div>
    </div>

    <div class="video-wrapper">
        <iframe id="camFrame" src="about:blank"></iframe>
        <div class="video-overlay">LIVE CAM</div>
    </div>
    <button class="reconnect-btn" onclick="forceReconnectVideo()">RECONNECT</button>

    <div class="mpu-grid">
        <div class="mpu-card">
            <div class="mpu-label">Roll Angle</div>
            <div class="mpu-val"><span id="txtRoll">0.0</span>°</div>
        </div>
        <div class="mpu-card">
            <div class="mpu-label">Pitch Angle</div>
            <div class="mpu-val"><span id="txtPitch">0.0</span>°</div>
        </div>
        <div class="mpu-card">
            <div class="mpu-label">Yaw Rate</div>
            <div class="mpu-val"><span id="txtYawRate">0.0</span>°/s</div>
        </div>
    </div>

    <div class="data-stats-grid">
        <div>KEMUDI: <b id="txtArah" style="color:#ff6b00">straight</b></div>
        <div>SPEED: <b id="txtSpeed" style="color:#ff6b00">0</b>%</div>
    </div>

    <div class="controls-row">
        <div class="col-throttle">
            <div class="slider-wrap" id="throttleZone">
                <div class="slider-fill-active" id="sliderFill"></div>
                <div class="slider-knob" id="sliderKnob"></div>
            </div>
            <div class="control-label">THROTTLE</div>
        </div>
        
        <div class="col-steering">
            <div id="joy-zone-simple"></div>
            <div class="control-label">STEERING</div>
        </div>
    </div>

    <button class="stop-btn" onclick="emergencyStop()">EMERGENCY STOP</button>
</div>

<script>
    const BROKER = "broker.emqx.io";
    const PORT = 8084;
    const TOPIC_CTRL = "undip/aterkia/zidan/control";
    const TOPIC_TELE = "undip/aterkia/zidan/telemetry";

    let lastArah = "straight", lastSpeed = 50, sendInterval = null;
    const client = new Paho.MQTT.Client(BROKER, Number(PORT), "gcs_u_" + Math.random().toString(16).substr(2, 4));

    function forceReconnectVideo() {
        document.getElementById('camFrame').src = "https://tugasakhiradit.loca.lt/cam/?t=" + Date.now();
    }

    client.onMessageArrived = (msg) => {
        if (msg.destinationName === TOPIC_TELE) {
            const parts = msg.payloadString.split(",");
            if (parts.length === 3) {
                document.getElementById("txtRoll").innerText = parseFloat(parts[0]).toFixed(1);
                document.getElementById("txtPitch").innerText = parseFloat(parts[1]).toFixed(1);
                document.getElementById("txtYawRate").innerText = parseFloat(parts[2]).toFixed(1);
            }
        }
    };

    client.onConnectionLost = () => { 
        document.getElementById("statusLabel").innerText = "TERPUTUS";
        document.getElementById("statusLabel").className = "status";
        setTimeout(connectMQTT, 3000);
    };

    function connectMQTT() {
        if(!client.isConnected()) {
            client.connect({ useSSL: true, timeout: 5, onSuccess: () => {
                document.getElementById("statusLabel").innerText = "ONLINE";
                document.getElementById("statusLabel").className = "status connected";
                client.subscribe(TOPIC_TELE);
                forceReconnectVideo();
            }, onFailure: () => {
                setTimeout(connectMQTT, 5000);
            }});
        }
    }
    connectMQTT();

    function sendData() {
        if (client.isConnected()) {
            const msg = new Paho.MQTT.Message(`${lastArah},${lastSpeed}`);
            msg.destinationName = TOPIC_CTRL;
            client.send(msg);
        }
    }

    function startSendingLoop() {
        if (!sendInterval) { sendInterval = setInterval(sendData, 120); }
    }

    // --- ENGINE SLIDER BIDIRECTIONAL DARI TENGAH ---
    const throttleZone = document.getElementById("throttleZone");
    const sliderFill = document.getElementById("sliderFill");
    const sliderKnob = document.getElementById("sliderKnob");

    function prosesSentuhanThrottle(e) {
        const rect = throttleZone.getBoundingClientRect();
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let posisiMurni = rect.bottom - clientY;
        let persentase = (posisiMurni / rect.height) * 100;
        
        persentase = Math.max(0, Math.min(100, persentase));
        lastSpeed = Math.round(persentase);

        // Atur posisi tombol (knob)
        sliderKnob.style.bottom = `calc(${persentase}% - 10px)`;

        // REVISI LOGIKA JALUR WARNA: Hitung jarak regangan dari titik tengah (50%)
        if (persentase >= 50) {
            // Jika digeser ke MAJU (atas)
            sliderFill.style.bottom = "50%";
            sliderFill.style.height = `${persentase - 50}%`;
        } else {
            // Jika digeser ke MUNDUR (bawah)
            sliderFill.style.bottom = `${persentase}%`;
            sliderFill.style.height = `${50 - persentase}%`;
        }

        let nilaiDisplay = Math.abs((lastSpeed - 50) * 2);
        document.getElementById("txtSpeed").innerText = nilaiDisplay;
        
        startSendingLoop();
    }

    throttleZone.addEventListener("mousedown", (e) => {
        prosesSentuhanThrottle(e);
        const mouseMoveHandler = (ev) => prosesSentuhanThrottle(ev);
        const mouseUpHandler = () => {
            document.removeEventListener("mousemove", mouseMoveHandler);
            document.removeEventListener("mouseup", mouseUpHandler);
        };
        document.addEventListener("mousemove", mouseMoveHandler);
        document.addEventListener("mouseup", mouseUpHandler);
    });

    throttleZone.addEventListener("touchstart", (e) => {
        prosesSentuhanThrottle(e);
        const touchMoveHandler = (ev) => { ev.preventDefault(); prosesSentuhanThrottle(ev); };
        const touchEndHandler = () => {
            document.removeEventListener("touchmove", touchMoveHandler);
            document.removeEventListener("touchend", touchEndHandler);
        };
        document.addEventListener("touchmove", touchMoveHandler, { passive: false });
        document.addEventListener("touchend", touchEndHandler);
    }, { passive: true });

    // --- STEERING JOYSTICK ENGINE ---
    var simpleJoy = {
        create: function(o) {
            var z = o.zone, b = document.createElement("div"), n = document.createElement("div"), isD = false;
            b.style = "position:absolute;width:70px;height:70px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:rgba(255,107,0,0.1);border:2px solid #ff6b00";
            n.style = "width:26px;height:26px;position:absolute;left:20px;top:20px;border-radius:50%;background:#ff6b00;transition:transform 0.05s linear;";
            b.appendChild(n); z.appendChild(b);
            
            const move = (e) => {
                if(!isD) return;
                const t = e.touches ? e.touches[0] : e, r = b.getBoundingClientRect();
                let dx = t.clientX - (r.left + 35); dx = Math.max(-35, Math.min(35, dx));
                n.style.transform = `translateX(${dx}px)`;
                lastArah = dx < -10 ? "left" : dx > 10 ? "right" : "straight";
                document.getElementById("txtArah").innerText = lastArah;
                startSendingLoop();
            };
            
            const end = () => { isD = false; n.style.transform = "translateX(0)"; lastArah = "straight"; document.getElementById("txtArah").innerText = "straight"; };
            
            z.addEventListener("mousedown", () => isD = true);
            z.addEventListener("touchstart", () => isD = true, { passive: true });
            document.addEventListener("mousemove", move);
            document.addEventListener("touchmove", move, { passive: false });
            document.addEventListener("mouseup", end);
            document.addEventListener("touchend", end);
        }
    };
    simpleJoy.create({zone: document.getElementById("joy-zone-simple")});

    function emergencyStop() {
        clearInterval(sendInterval); sendInterval = null;
        lastArah = "straight"; lastSpeed = 50;
        sliderKnob.style.bottom = "calc(50% - 10px)";
        sliderFill.style.height = "0%";
        document.getElementById("txtArah").innerText = "straight";
        document.getElementById("txtSpeed").innerText = "0";
        if (client.isConnected()) {
            client.send(new Paho.MQTT.Message("straight,50") {{ destinationName: TOPIC_CTRL }});
        }
    }
</script>
</body>
</html>
