<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCS Kapal USV - Tugas Akhir</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a22; color: #fff; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 95vh; overflow: hidden; user-select: none;
        }
        .container {
            width: 100%; max-width: 480px; background: #252533; padding: 15px;
            border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); text-align: center; box-sizing: border-box;
        }
        h2 { color: #4cc9f0; margin: 0 0 5px 0; font-size: 20px; }
        .status {
            display: inline-block; padding: 4px 12px; border-radius: 15px;
            font-weight: bold; font-size: 12px; background-color: #f72585; margin-bottom: 10px; transition: 0.3s;
        }
        .connected { background-color: #4cc9f0; color: #1a1a22; }
        
        /* --- Video Stream Box Layout --- */
        .video-container {
            width: 100%; height: 240px; background-color: #000; border-radius: 12px;
            margin-bottom: 15px; overflow: hidden; position: relative; border: 2px solid #3f3f5a;
        }
        .video-overlay {
            position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6);
            padding: 4px 8px; border-radius: 6px; font-size: 11px; font-family: monospace;
            color: #4cc9f0; pointer-events: none;
        }

        .data-display {
            display: flex; justify-content: space-around; background: #1e1e28;
            padding: 10px; border-radius: 10px; margin-bottom: 15px; font-family: monospace; font-size: 13px;
        }
        .val { color: #4cc9f0; font-weight: bold; }

        .control-grid {
            display: table; width: 100%; margin-bottom: 15px;
        }
        .col-slider {
            display: table-cell; width: 35%; vertical-align: middle; text-align: center;
        }
        .col-joystick {
            display: table-cell; width: 65%; vertical-align: middle; text-align: center;
        }

        /* Desain Bar Geser Bidirectional Slider */
        .slider-wrapper {
            height: 180px; width: 36px; display: inline-block; position: relative;
            background: #1e1e28; border-radius: 18px; border: 2px solid #333; overflow: hidden;
        }
        .slider-fill-track {
            position: absolute; left: 0; width: 100%; background: #4cc9f0;
            box-shadow: 0 0 10px rgba(76, 201, 240, 0.6);
        }
        .slider-vertical {
            position: absolute; top: 0; left: 0; width: 36px; height: 180px; margin: 0;
            opacity: 0; cursor: pointer; writing-mode: bt-lr; appearance: slider-vertical; -webkit-appearance: slider-vertical; z-index: 3;
        }
        .slider-knob {
            position: absolute; left: 50%; width: 30px; height: 30px; background: #ffffff;
            border: 3px solid #4361ee; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 4;
        }

        .control-label {
            font-size: 11px; color: #888; margin-top: 6px; font-weight: bold; letter-spacing: 1px;
        }

        #joystick-zone {
            width: 170px; height: 170px; background: #1e1e28; margin: 0 auto;
            border-radius: 50%; position: relative; border: 2px dashed #4361ee;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        
        button.stop-btn {
            width: 100%; padding: 12px; font-size: 15px; font-weight: bold;
            background-color: #f72585; color: white; border: none; border-radius: 10px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(247, 37, 133, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GCS UTAMA - KAPAL USV</h2>
    <p style="margin: 0 0 10px 0; color:#888; font-size: 12px;">Monitoring Real-time WebRTC Camera & MQTT Control</p>
    
    <div id="statusLabel" class="status">MENGHUBUNGKAN MQTT...</div>
    
    <div class="video-container">
        <video id="videoUSV" autoplay muted playsinline style="width: 100%; height: 100%; object-fit: cover; background: #000;"></video>
        <div class="video-overlay">🔴 LIVE WEBRTC CAM (NATIVE)</div>
    </div>

    <div class="data-display">
        <div>KEMUDI: <span id="txtArah" class="val">straight</span></div>
        <div>THROTTLE: <span id="txtSpeed" class="val">0</span>% (<span id="txtStatusMotor" style="color: #ffb703;">DIAM</span>)</div>
    </div>

    <div class="control-grid">
        <div class="col-slider">
            <div class="slider-wrapper">
                <div id="sliderFill" class="slider-fill-track"></div>
                <div id="sliderKnob" class="slider-knob"></div>
                <input type="range" id="throttleSlider" class="slider-vertical" min="0" max="100" value="50" oninput="updateSliderThrottle(this.value)">
            </div>
            <div class="control-label">THROTTLE</div>
        </div>
        
        <div class="col-joystick">
            <div id="joystick-zone"></div>
            <div class="control-label" style="margin-top: 10px;">STEERING</div>
        </div>
    </div>

    <button class="stop-btn" onclick="emergencyStop()">🛑 EMERGENCY STOP</button>
</div>

<script>
    // --- KONFIGURASI ALAMAT JALUR ---
    const BROKER_HOST = "broker.emqx.io";
    const BROKER_PORT = 8084; 
    const TOPIC = "undip/aterkia/zidan/control";
    
    // URL Endpoint WHEP Ngrok Anda
    const WHEP_URL = "https://postbox-papyrus-left.ngrok-free.dev/cam/whep";

    // --- CLIENT WEBRTC HANDSHAKE ENGINE (WHEP) WITH NGROK BYPASS ---
    async function startWebRTCVideo() {
        const videoElement = document.getElementById('videoUSV');
        
        // Buat objek RTCPeerConnection standar browser
        const pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
            bundlePolicy: "max-bundle"
        });

        // Paksa peer connection hanya meminta data VIDEO saja (recvonly)
        pc.addTransceiver('video', { direction: 'recvonly' });

        // Ketika data stream video dari Raspi diterima, pasang ke tag <video>
        pc.ontrack = (event) => {
            if (videoElement.srcObject !== event.streams[0]) {
                videoElement.srcObject = event.streams[0];
                console.log('✓ Video stream USV WebRTC berhasil dipasang secara native.');
            }
        };

        try {
            // Buat penawaran koneksi (SDP Offer)
            const offer = await pc.createOffer();
            let sdp = offer.sdp;
            
            await pc.setLocalDescription({ type: 'offer', sdp: sdp });

            console.log("Mengirim jabat tangan WHEP ke Ngrok dengan bypass header...");

            // JABAT TANGAN VIA FETCH DENGAN HEADERS BYPASS
            const response = await fetch(WHEP_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'text/plain',
                    'ngrok-skip-browser-warning': 'true' 
                },
                body: sdp
            });

            if (!response.ok) {
                throw new Error('Server merespons status: ' + response.status);
            }

            // Ambil jawaban SDP dari MediaMTX Raspi
            const answerSdp = await response.text();
            
            // Selesaikan koneksi WebRTC
            await pc.setRemoteDescription(new RTCSessionDescription({
                type: 'answer',
                sdp: answerSdp
            }));
            
            console.log("✓ Jalur WebRTC sukses terbuka tanpa interupsi!");
            
        } catch (error) {
            console.error('Koneksi WebRTC Gagal:', error);
            // Rekoneksi otomatis setiap 5 detik jika internet kapal drop di lapangan
            setTimeout(startWebRTCVideo, 5000); 
        }
    }

    // --- LAUNCH ENGINE CONTROLLER ---
    let lastArah = "straight"; let lastSpeed = 50; let sendInterval = null;
    const statusLabel = document.getElementById("statusLabel");

    const clientId = "web_gcs_" + Math.random().toString(16).substr(2, 8);
    const client = new Paho.MQTT.Client(BROKER_HOST, Number(BROKER_PORT), clientId);

    client.onConnectionLost = (responseObject) => { 
        statusLabel.innerText = "KONEKSI TERPUTUS"; 
        statusLabel.className = "status"; 
        statusLabel.style.backgroundColor = "#f72585";
        setTimeout(eksekusiKoneksiMQTT, 3000);
    };

    function eksekusiKoneksiMQTT() {
        statusLabel.innerText = "MENGHUBUNGKAN MQTT...";
        statusLabel.className = "status";
        statusLabel.style.backgroundColor = "#f72585";
        
        client.connect({
            useSSL: true,
            timeout: 5,
            onSuccess: () => { 
                statusLabel.innerText = "ONLINE (CONTROL & VIDEO READY)"; 
                statusLabel.className = "status connected"; 
            },
            onFailure: (error) => { 
                statusLabel.innerText = "KONEKSI GAGAL"; 
                statusLabel.className = "status"; 
                statusLabel.style.backgroundColor = "#f72585";
                setTimeout(eksekusiKoneksiMQTT, 5000);
            }
        });
    }

    // Eksekusi koneksi MQTT dan jalankan video WHEP secara simultan
    eksekusiKoneksiMQTT();
    startWebRTCVideo(); 

    function kirimDataMQTT(payload) { 
        if (client && client.isConnected()) { 
            const message = new Paho.MQTT.Message(payload); 
            message.destinationName = TOPIC; 
            client.send(message); 
        } 
    }
    
    function picuLoopPengiriman() { 
        if (!sendInterval) { 
            sendInterval = setInterval(() => { 
                kirimDataMQTT(`${lastArah},${lastSpeed}`); 
            }, 120); 
        } 
    }

    // --- KONTROL INDIKATOR WARNA SLIDER DUA ARAH ---
    function updateSliderThrottle(val) {
        let rawValue = parseInt(val); lastSpeed = rawValue;
        let displayPercent = 0; let statusMotor = "DIAM";
        const fillElement = document.getElementById("sliderFill");
        const knobElement = document.getElementById("sliderKnob");
        
        let knobTopPos = 180 - (rawValue * 1.8);
        knobElement.style.top = knobTopPos + "px";

        if (rawValue > 50) {
            displayPercent = (rawValue - 50) * 2; statusMotor = "MAJU";
            fillElement.style.top = (180 - (rawValue * 1.8)) + "px";
            fillElement.style.height = ((rawValue - 50) * 1.8) + "px";
        } else if (rawValue < 50) {
            displayPercent = (50 - rawValue) * 2; statusMotor = "MUNDUR";
            fillElement.style.top = "90px";
            fillElement.style.height = ((50 - rawValue) * 1.8) + "px";
        } else {
            displayPercent = 0; statusMotor = "DIAM";
            fillElement.style.top = "90px"; fillElement.style.height = "0px";
        }
        document.getElementById("txtSpeed").innerText = displayPercent;
        document.getElementById("txtStatusMotor").innerText = statusMotor;
        picuLoopPengiriman();
    }

    // --- ENGINE JOYSTICK EMBEDDED WITH RIGHT-CLICK FAILSAFE ---
    var nipplejs = {
        create: function (options) {
            var zone = options.zone; 
            var box = document.createElement("div");
            box.style.position = "absolute"; box.style.width = "110px"; box.style.height = "110px"; box.style.left = "50%"; box.style.top = "50%"; box.style.transform = "translate(-50%, -50%)";
            box.style.borderRadius = "50%"; box.style.background = "rgba(67, 97, 238, 0.2)"; box.style.border = "2px solid #4361ee";
            
            var nipple = document.createElement("div");
            nipple.style.width = "45px"; nipple.style.height = "45px"; nipple.style.position = "absolute"; nipple.style.left = "32.5px"; nipple.style.top = "32.5px"; nipple.style.borderRadius = "50%";
            nipple.style.background = "#4361ee"; nipple.style.boxShadow = "0 4px 10px rgba(0,0,0,0.5)"; nipple.style.cursor = "pointer";
            
            box.appendChild(nipple); 
            zone.appendChild(box); 
            
            var isRightDragging = false;
            var callbacks = {};

            var moveHandler = function (e) {
                if (!isRightDragging) return; 
                e.preventDefault();
                var touch = e.touches ? e.touches[0] : e;
                var rect = box.getBoundingClientRect();
                var deltaX = touch.pageX - (rect.left + 55);
                var deltaY = touch.pageY - (rect.top + 55);
                var distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                
                if (distance > 55) { deltaX = (deltaX / distance) * 55; deltaY = (deltaY / distance) * 55; }
                nipple.style.transform = "translate(" + deltaX + "px, " + deltaY + "px)";
                
                var directionX = "straight";
                if (deltaX < -15) directionX = "left";
                else if (deltaX > 15) directionX = "right";
                
                if (callbacks["move"]) callbacks["move"](null, { direction: { x: directionX }, distance: distance });
            };

            var endHandler = function () {
                if (!isRightDragging) return;
                isRightDragging = false;
                nipple.style.transform = "translate(0px, 0px)";
                if (callbacks["end"]) callbacks["end"]();
            };

            zone.addEventListener("mousedown", function (e) {
                if (e.button === 2) { 
                    isRightDragging = true;
                    document.addEventListener("mousemove", moveHandler);
                    document.addEventListener("mouseup", endHandler);
                }
            });

            window.addEventListener("mouseleave", endHandler);
            window.addEventListener("mouseup", endHandler);

            return { on: function (evt, cb) { callbacks[evt] = cb; } };
        }
    };

    document.getElementById('joystick-zone').addEventListener('contextmenu', e => e.preventDefault());

    const joyManager = nipplejs.create({ zone: document.getElementById('joystick-zone') });
    joyManager.on('move', (evt, data) => { 
        if (!data.direction) return; 
        let arah = data.direction.x || "straight"; 
        document.getElementById("txtArah").innerText = arah; 
        lastArah = arah; 
        picuLoopPengiriman(); 
    });
    joyManager.on('end', () => { 
        lastArah = "straight"; 
        document.getElementById("txtArah").innerText = "straight"; 
        picuLoopPengiriman(); 
    });

    function emergencyStop() {
        clearInterval(sendInterval); sendInterval = null; lastArah = "straight"; lastSpeed = 50;
        document.getElementById("throttleSlider").value = 50;
        document.getElementById("sliderFill").style.top = "90px"; document.getElementById("sliderFill").style.height = "0px"; document.getElementById("sliderKnob").style.top = "90px";
        document.getElementById("txtArah").innerText = "straight"; document.getElementById("txtSpeed").innerText = "0"; document.getElementById("txtStatusMotor").innerText = "DIAM";
        kirimDataMQTT("straight,50");
    }

    window.onload = function() {
        updateSliderThrottle(50);
    };
</script>
</body>
</html>
